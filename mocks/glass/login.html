<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Stickit — サインイン (Glass)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+JP:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="_shared.css">
<style>
  body { overflow: hidden; }
  .login-stage {
    position: relative;
    height: 100vh;
    display: grid;
    place-items: center;
    padding: 20px;
  }

  /* Floating decorative cards */
  .float {
    position: absolute;
    background: rgba(255,255,255,.55);
    backdrop-filter: blur(20px) saturate(180%);
    -webkit-backdrop-filter: blur(20px) saturate(180%);
    border: 1px solid var(--hairline);
    border-radius: var(--r-lg);
    padding: 12px 14px;
    box-shadow: 0 8px 32px rgba(70,40,140,.10);
    display: flex; align-items: center; gap: 10px;
    pointer-events: none;
  }
  .float .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .float .ttl { font-size: 12px; font-weight: 600; color: var(--ink); white-space: nowrap; }
  .float .sub { font-size: 11px; color: var(--ink-3); }

  .f1 { top: 14%; left: 8%; transform: rotate(-6deg); }
  .f2 { top: 22%; right: 10%; transform: rotate(5deg); }
  .f3 { bottom: 18%; left: 12%; transform: rotate(4deg); }
  .f4 { bottom: 14%; right: 8%; transform: rotate(-7deg); }
  .f5 { top: 50%; left: 4%; transform: translateY(-50%) rotate(-3deg); }

  /* Sticky note style floats */
  .float.note {
    width: 160px;
    flex-direction: column;
    align-items: flex-start;
    gap: 6px;
    padding: 14px;
    border: none;
  }
  .float.note .ttl { font-family: var(--display); font-size: 13px; line-height: 1.35; white-space: normal; }
  .float.note .meta { font-size: 10px; opacity: .65; font-weight: 500; }

  /* Auth card */
  .auth-card {
    position: relative;
    width: 420px;
    max-width: calc(100vw - 40px);
    background: rgba(255,255,255,.72);
    backdrop-filter: blur(40px) saturate(200%);
    -webkit-backdrop-filter: blur(40px) saturate(200%);
    border: 1px solid var(--hairline);
    border-radius: var(--r-xl);
    padding: 36px 36px 28px;
    box-shadow: 0 24px 64px rgba(70,40,140,.18), 0 4px 12px rgba(70,40,140,.06);
    text-align: center;
    z-index: 1;
  }

  .logo-mark {
    width: 56px; height: 56px;
    border-radius: 16px;
    background: linear-gradient(135deg, var(--primary), var(--primary-deep));
    color: #fff;
    margin: 0 auto 18px;
    display: grid; place-items: center;
    font-family: var(--display);
    font-weight: 700;
    font-size: 26px;
    letter-spacing: -0.02em;
    box-shadow: 0 8px 24px var(--primary-glow);
  }
  .logo-name {
    font-family: var(--display);
    font-size: 28px;
    font-weight: 600;
    letter-spacing: -0.022em;
    color: var(--ink);
    margin: 0 0 6px;
  }
  .logo-tag {
    font-size: 13px;
    color: var(--ink-3);
    margin: 0 0 28px;
  }

  .google-btn {
    width: 100%;
    height: 48px;
    border-radius: var(--r-md);
    background: #fff;
    border: 1px solid rgba(0,0,0,.10);
    box-shadow: 0 2px 8px rgba(0,0,0,.06);
    display: inline-flex; align-items: center; justify-content: center;
    gap: 12px;
    font-size: 15px;
    font-weight: 500;
    color: #3C4043;
    letter-spacing: -0.012em;
    transition: transform 100ms ease, box-shadow 100ms ease;
  }
  .google-btn:hover { transform: translateY(-1px); box-shadow: 0 4px 14px rgba(0,0,0,.10); }

  .divider {
    display: flex; align-items: center; gap: 12px;
    margin: 22px 0 16px;
    font-size: 11px;
    color: var(--ink-3);
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }
  .divider::before, .divider::after {
    content: ""; flex: 1; height: 1px; background: var(--hairline-soft);
  }

  .features {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    margin-top: 6px;
  }
  .feat {
    display: flex; flex-direction: column; align-items: center; gap: 6px;
    padding: 10px 4px;
    border-radius: var(--r-md);
  }
  .feat-ic {
    width: 32px; height: 32px;
    border-radius: 10px;
    background: var(--primary-soft);
    color: var(--primary-deep);
    display: grid; place-items: center;
  }
  .feat-ic .ic { width: 16px; height: 16px; stroke-width: 1.8; }
  .feat-ttl { font-size: 11px; font-weight: 600; color: var(--ink); }
  .feat-sub { font-size: 10px; color: var(--ink-3); text-align: center; line-height: 1.3; }

  .legal {
    margin-top: 24px;
    font-size: 11px;
    color: var(--ink-3);
    line-height: 1.6;
  }
  .legal a { color: var(--primary-deep); text-decoration: none; font-weight: 500; }
  .legal a:hover { text-decoration: underline; }
</style>
</head>
<body>
<div class="gradient-bg"></div>

<div class="login-stage">

  <!-- Decorative floating cards -->
  <div class="float f1">
    <div class="dot" style="background:#7BC4E0"></div>
    <div>
      <div class="ttl">朝礼 8:30</div>
      <div class="sub">支配人業務 · 今日</div>
    </div>
  </div>

  <div class="float note t-mint f2">
    <div class="meta">付箋 · OTA戦略</div>
    <div class="ttl">価格差500円検証<br>来週月曜まで</div>
  </div>

  <div class="float f3">
    <div class="dot" style="background:#E47B9F"></div>
    <div>
      <div class="ttl">キャプテンカップ準備</div>
      <div class="sub">5/20 · あと5日</div>
    </div>
  </div>

  <div class="float note t-yellow f4">
    <div class="meta">繰り返し · 月次</div>
    <div class="ttl">RM分析<br>月初3営業日以内</div>
  </div>

  <div class="float f5">
    <div class="dot" style="background:#80C99A"></div>
    <div>
      <div class="ttl">完了 · 12件</div>
      <div class="sub">今日のタスク</div>
    </div>
  </div>

  <!-- Auth card -->
  <div class="auth-card">
    <div class="logo-mark">S</div>
    <h1 class="logo-name">Stickit</h1>
    <p class="logo-tag">タスク・カレンダー・付箋を、ひとつに。</p>

    <button class="google-btn">
      <svg width="20" height="20" viewBox="0 0 18 18">
        <path fill="#4285F4" d="M17.64 9.2c0-.64-.06-1.25-.16-1.84H9v3.48h4.84c-.21 1.13-.84 2.08-1.79 2.72v2.26h2.9c1.7-1.56 2.69-3.87 2.69-6.62z"/>
        <path fill="#34A853" d="M9 18c2.43 0 4.46-.81 5.95-2.18l-2.9-2.26c-.81.54-1.84.86-3.05.86-2.34 0-4.32-1.58-5.03-3.71H.96v2.33A9 9 0 0 0 9 18z"/>
        <path fill="#FBBC05" d="M3.97 10.71A5.41 5.41 0 0 1 3.68 9c0-.6.1-1.18.29-1.71V4.96H.96A9 9 0 0 0 0 9c0 1.45.35 2.83.96 4.04l3.01-2.33z"/>
        <path fill="#EA4335" d="M9 3.58c1.32 0 2.5.45 3.44 1.35l2.58-2.58C13.46.89 11.43 0 9 0A9 9 0 0 0 .96 4.96l3.01 2.33C4.68 5.16 6.66 3.58 9 3.58z"/>
      </svg>
      Google で続行
    </button>

    <div class="divider">できること</div>

    <div class="features">
      <div class="feat">
        <div class="feat-ic"><svg class="ic" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg></div>
        <div class="feat-ttl">タスク</div>
        <div class="feat-sub">期限・繰り返し</div>
      </div>
      <div class="feat">
        <div class="feat-ic"><svg class="ic" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="17" rx="2"/><path d="M3 10h18M8 2v4M16 2v4"/></svg></div>
        <div class="feat-ttl">カレンダー</div>
        <div class="feat-sub">月 / 週 / 日</div>
      </div>
      <div class="feat">
        <div class="feat-ic"><svg class="ic" viewBox="0 0 24 24"><rect x="4" y="4" width="7" height="7" rx="1"/><rect x="13" y="4" width="7" height="7" rx="1"/><rect x="4" y="13" width="7" height="7" rx="1"/></svg></div>
        <div class="feat-ttl">付箋</div>
        <div class="feat-sub">カンバン形式</div>
      </div>
    </div>

    <p class="legal">
      続行することで <a>利用規約</a> と <a>プライバシーポリシー</a> に同意したものとみなされます。
    </p>
  </div>
</div>
</body>
</html>
