name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm install --no-audit --no-fund
      - run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          # VAPID public key — safe to expose, used by Service Worker subscribe()
          VITE_VAPID_PUBLIC_KEY: BJgn5OSDGkyYuFa7ns1GpynhVmuUR4A_cWg5jc5Jl9Hph0ItoEBptlSlwW8NfKAT0ZacbFfvMdkn3xZtarv7E0s
      # SPA fallback: GitHub Pages does not natively support client-side routing.
      # Copy index.html to 404.html so /Stickit/auth/callback etc. serve the SPA.
      - run: cp dist/index.html dist/404.html
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist
      - id: deployment
        uses: actions/deploy-pages@v4
